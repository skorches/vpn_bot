# /etc/nginx/nginx.conf on the Russian proxy VPS
#
# Forwards VLESS TCP traffic to the Germany VPS.
# Users connect to   vpn.yourdomain.com:<port>
# Proxy forwards to  GERMANY_VPS_IP:<port>
#
# Replace GERMANY_VPS_IP with your actual Germany server IP.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
}

# ── TCP/UDP stream proxy (VLESS Reality traffic) ──
stream {

    # Logging (optional — helps debug blocked ports)
    log_format proxy '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';
    access_log /var/log/nginx/stream-access.log proxy;

    # ── Port 443 — main VLESS inbound ──
    server {
        listen 443;
        listen [::]:443;
        proxy_pass GERMANY_VPS_IP:443;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Port range for dynamically created inbounds ──
    # 3x-ui assigns random ports (20000–49999) for anti-configs
    # and additional inbounds. Add each port you open in 3x-ui.
    #
    # Option A: list them explicitly
    server {
        listen 20000-20100;
        listen [::]:20000-20100;
        proxy_pass GERMANY_VPS_IP:$server_port;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Uncomment and add more ranges as needed:
    # server {
    #     listen 31000-32000;
    #     listen [::]:31000-32000;
    #     proxy_pass GERMANY_VPS_IP:$server_port;
    #     proxy_timeout 300s;
    #     proxy_connect_timeout 10s;
    # }
}
